# .github/workflows/build-image.yml
# Builds the musica Pi 5 image inside a privileged arm64 Docker container
# using QEMU binfmt emulation on a GitHub-hosted x86 runner.
#
# The final image is cached keyed on the SHA-256 hash of rpi-image/ content.
# If nothing in rpi-image/ has changed, the build is skipped entirely and the
# cached image is reused — saving ~30-60 min of QEMU build time.
#
# Multirepo: to download this image from another workflow, use:
#   gh run download --repo <owner>/musica --name musica-pi5-image
#
# FASTER OPTION: switch `runs-on` to `ubuntu-24.04-arm` for a native arm64
# GitHub-hosted runner (requires GitHub Team/Enterprise plan), or use a
# self-hosted arm64 runner (e.g. your Pi) for the fastest builds.

name: Build musica Pi Image

on:
  push:
    branches: [main, feature/plai-bootstrap]
    paths:
      - 'rpi-image/**'
      - '.github/workflows/build-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rpi-image/**'
  workflow_dispatch:    # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Hash the entire rpi-image/ tree to produce a stable cache key.
      # Any change to config, layers, or the Dockerfile invalidates the cache.
      - name: Compute rpi-image content hash
        id: hash
        run: |
          HASH=$(find rpi-image -type f | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "key=musica-pi5-image-${HASH}" >> $GITHUB_OUTPUT
          echo "Cache key: musica-pi5-image-${HASH}"

      # Restore cached image if the rpi-image content hasn't changed.
      # On a hit, all build steps below are skipped.
      - name: Restore image cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: cached-image/
          key: ${{ steps.hash.outputs.key }}

      # --- Build steps (skipped on cache hit) ---

      # QEMU arm64 emulation is memory-hungry. Add swap on /mnt (ephemeral disk)
      # so mmdebstrap's apt-get doesn't OOM inside the emulated chroot.
      # Note: GitHub runners already have /swapfile in use — use /mnt instead.
      - name: Add swap space
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "Swap after:"
          free -h

      # Enable QEMU for arm64 emulation on the x86 runner
      - name: Set up QEMU binfmt
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      # Build the rpi-image-gen Docker image (Debian Bookworm arm64)
      # We run it --privileged so mmdebstrap can mount pseudo-filesystems
      - name: Build rpi-image-gen container image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker build \
            --platform linux/arm64 \
            -t rpi-image-gen-builder \
            -f rpi-image/Dockerfile.builder \
            .

      # Allow QEMU processes inside the container to overcommit virtual memory.
      # Without this, mmdebstrap's apt-get update OOMs even with swap available
      # because the kernel refuses large mmap() calls in the emulated environment.
      - name: Allow memory overcommit for QEMU
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo sysctl vm.overcommit_memory=1

      - name: Build musica Pi image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker volume rm musica-build-vol 2>/dev/null || true
          docker volume create musica-build-vol
          docker run --rm \
            --platform linux/arm64 \
            --privileged \
            -v ${{ github.workspace }}/rpi-image:/workspace/rpi-image \
            -v musica-build-vol:/rpi-output \
            rpi-image-gen-builder \
            bash -c "
              mkdir -p /rpi-output && \
              cd /workspace/rpi-image-gen && \
              ./rpi-image-gen build \
                -S /workspace/rpi-image/config \
                -c /workspace/rpi-image/config/musica-pi5.yaml \
                -B /rpi-output
            "

      # Copy the image to a stable path for caching and upload.
      # Uses an alpine container to avoid permission issues extracting from the volume.
      - name: Collect image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p cached-image
          docker run --rm \
            -v musica-build-vol:/src:ro \
            -v ${{ github.workspace }}/cached-image:/dst \
            alpine sh -c 'find /src -name "musica-pi5.img" -exec cp {} /dst/ \;'
          docker volume rm musica-build-vol

      # Save image to cache for future runs with the same rpi-image content.
      # actions/cache compresses with zstd — the mostly-zero ext4 image should
      # shrink from ~8 GB to 1-3 GB, well within the 10 GB cache limit.
      - name: Save image cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: cached-image/
          key: ${{ steps.hash.outputs.key }}

      # --- Post-build steps (always run) ---

      # Smoke test: verify the image was produced and is a reasonable size
      - name: Smoke test — image exists and is plausibly sized
        run: |
          IMG=$(find cached-image -name "*.img" | head -1)
          if [ -z "$IMG" ]; then
            echo "ERROR: No .img file found in cached-image/"
            exit 1
          fi
          SIZE=$(stat -c%s "$IMG")
          echo "Image: $IMG  Size: $SIZE bytes"
          # Expect at least 500 MB
          if [ "$SIZE" -lt 524288000 ]; then
            echo "ERROR: Image is suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "PASS: Image looks healthy"

      # Upload the image as a downloadable artifact (only on main branch pushes)
      - name: Upload image artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: musica-pi5-image
          path: cached-image/*.img
          retention-days: 30
