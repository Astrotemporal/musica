# deployment/docker-compose.yml
# Standalone compose file for dev use or deploying on an existing Pi/node.
# NOT the same as the compose baked into the image by musica-bootstrap.yaml —
# this one uses relative paths and environment variable defaults suitable for
# running from a cloned repo directory.
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   MUSIC_DIR=/path/to/music docker compose up -d

services:

  # ---------------------------------------------------------------------------
  # Navidrome — SubSonic-compatible music server
  # UI: http://localhost:4533  (or http://<zerotier-ip>:4533 remotely)
  # ---------------------------------------------------------------------------
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "1000:1000"
    environment:
      ND_SCANSCHEDULE: "1h"
      ND_LOGLEVEL: "info"
      ND_SESSIONTIMEOUT: "24h"
      ND_BASEURL: ""
      # Last.fm integration — disabled by default; set keys in .env to enable
      ND_LASTFM_ENABLED: "${LASTFM_ENABLED:-false}"
      ND_LASTFM_APIKEY: "${LASTFM_APIKEY:-}"
      ND_LASTFM_SECRET: "${LASTFM_SECRET:-}"
    volumes:
      - ${MUSIC_DIR:-./music}:/music:ro     # read-only; downloaders write here
      - ./data/navidrome:/data
    ports:
      - "4533:4533"
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # DAB Downloader — yt-dlp backed music downloader (on-demand search+download)
  # Writes to the shared music directory that Navidrome watches.
  # ---------------------------------------------------------------------------
  # DAB is a CLI tool (not a long-running server). Use via:
  #   docker compose run --rm dab search "Artist Name"
  #   docker compose run --rm dab download <track-id>
  dab:
    image: prathxm/dab-downloader:latest
    container_name: dab
    profiles:
      - cli                               # not started by default; use `docker compose run`
    volumes:
      - ${MUSIC_DIR:-./music}:/downloads
      - ./data/dab-config:/app/config
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # MusicGrabber — on-demand search + download UI
  # Searches YouTube, SoundCloud, Monochrome/Tidal in parallel.
  # Downloads best quality as FLAC. Auto-triggers Navidrome rescan.
  # UI: http://localhost:7171
  # ---------------------------------------------------------------------------
  musicgrabber:
    image: g33kphr33k/musicgrabber:latest
    container_name: musicgrabber
    restart: unless-stopped
    shm_size: '2gb'                         # Chromium headless needs this for large playlists
    environment:
      MUSIC_DIR: "/music"
      ENABLE_MUSICBRAINZ: "true"
      DEFAULT_CONVERT_TO_FLAC: "true"
      NAVIDROME_URL: "http://navidrome:4533"
      NAVIDROME_USER: "${NAVIDROME_ADMIN_USER:-}"
      NAVIDROME_PASS: "${NAVIDROME_ADMIN_PASS:-}"
    volumes:
      - ${MUSIC_DIR:-./music}:/music
      - ./data/musicgrabber:/data
      - ./data/downloads:/downloads         # slskd integration (optional)
    ports:
      - "7171:8080"
    depends_on:
      - navidrome
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # Lidarr — music library manager (automated "wanted" lists + import)
  # Monitors artists/albums, triggers downloads via slskd, imports to music dir.
  # UI: http://localhost:8686
  # ---------------------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "${TZ:-America/Los_Angeles}"
    volumes:
      - ./data/lidarr:/config
      - ${MUSIC_DIR:-./music}:/music
      - ./data/downloads:/downloads       # slskd downloads land here; Lidarr imports
    ports:
      - "8686:8686"
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # slskd — Soulseek daemon with REST API + web UI
  # P2P music network. Lidarr searches via Tubifarry/Soularr plugin.
  # UI: http://localhost:5030
  # ---------------------------------------------------------------------------
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    environment:
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_SLSK_USERNAME: "${SOULSEEK_USER:-}"
      SLSKD_SLSK_PASSWORD: "${SOULSEEK_PASS:-}"
    volumes:
      - ./data/slskd:/app
      - ./data/downloads:/downloads       # shared with Lidarr
      - ${MUSIC_DIR:-./music}:/music:ro   # for sharing back to network
    ports:
      - "5030:5030"
      - "50300:50300"                     # Soulseek listen port
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # Caddy — reverse proxy
  # Enable for public HTTPS access (music.plai.do). Requires DNS + port forward.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    profiles:
      - public                            # only starts with --profile public
    volumes:
      - ./data/caddy:/data
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      - navidrome
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # Optional: analytics sidecar (uncomment when ready)
  # ---------------------------------------------------------------------------
  # analytics:
  #   image: ghcr.io/your-org/musica-analytics:latest
  #   container_name: musica-analytics
  #   restart: unless-stopped
  #   volumes:
  #     - ./data/analytics:/data
  #   environment:
  #     NAVIDROME_URL: "http://navidrome:4533"
  #     NAVIDROME_USER: "${NAVIDROME_ADMIN_USER}"
  #     NAVIDROME_PASS: "${NAVIDROME_ADMIN_PASS}"
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - musica_net

networks:
  musica_net:
    driver: bridge
