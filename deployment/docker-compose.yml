# deployment/docker-compose.yml
# Standalone compose file for dev use or deploying on an existing Pi/node.
# NOT the same as the compose baked into the image by musica-bootstrap.yaml --
# this one uses relative paths and environment variable defaults suitable for
# running from a cloned repo directory.
#
# Architecture:
#   Caddy (:4533) is the single entry point (gateway).
#     /        -> Navidrome (music server)
#     /grab/   -> MusicGrabber (search + download UI)
#   All other services are internal-only (no host ports exposed).
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   MUSIC_DIR=/path/to/music docker compose up -d

services:

  # ---------------------------------------------------------------------------
  # Caddy — unified gateway (always-on)
  # Single entry point: :4533 for local/ZT, :80/:443 for public HTTPS
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    volumes:
      - ./data/caddy:/data
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "4533:4533"                         # Navidrome (local + ZeroTier)
      - "7171:7171"                         # MusicGrabber (local + ZeroTier)
      - "80:80"                             # public HTTPS (ACME challenge)
      - "443:443"                           # public HTTPS (music.plai.do)
      - "443:443/udp"                       # HTTP/3
    depends_on:
      - navidrome
      - musicgrabber
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # Navidrome — SubSonic-compatible music server (internal, behind Caddy)
  # ---------------------------------------------------------------------------
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "1000:1000"
    environment:
      ND_SCANSCHEDULE: "1h"
      ND_LOGLEVEL: "info"
      ND_SESSIONTIMEOUT: "24h"
      ND_BASEURL: ""
      ND_LASTFM_ENABLED: "${LASTFM_ENABLED:-false}"
      ND_LASTFM_APIKEY: "${LASTFM_APIKEY:-}"
      ND_LASTFM_SECRET: "${LASTFM_SECRET:-}"
    expose:
      - "4533"
    volumes:
      - ${MUSIC_DIR:-./music}:/music:ro
      - ./data/navidrome:/data
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # MusicGrabber — on-demand search + download UI (internal, behind Caddy)
  # Searches YouTube, SoundCloud, Monochrome/Tidal in parallel.
  # Downloads best quality as FLAC. Auto-triggers Navidrome rescan.
  # ---------------------------------------------------------------------------
  musicgrabber:
    image: g33kphr33k/musicgrabber:latest
    container_name: musicgrabber
    restart: unless-stopped
    shm_size: '2gb'
    environment:
      MUSIC_DIR: "/music"
      ENABLE_MUSICBRAINZ: "true"
      DEFAULT_CONVERT_TO_FLAC: "true"
      NAVIDROME_URL: "http://navidrome:4533"
      NAVIDROME_USER: "${NAVIDROME_ADMIN_USER:-}"
      NAVIDROME_PASS: "${NAVIDROME_ADMIN_PASS:-}"
    expose:
      - "8080"
    volumes:
      - ${MUSIC_DIR:-./music}:/music
      - ./data/musicgrabber:/data
      - ./data/downloads:/downloads
    depends_on:
      - navidrome
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # DAB Downloader — CLI-only (on-demand search+download via DAB API)
  # ---------------------------------------------------------------------------
  dab:
    image: prathxm/dab-downloader:latest
    container_name: dab
    profiles:
      - cli
    volumes:
      - ${MUSIC_DIR:-./music}:/downloads
      - ./data/dab-config:/app/config
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # Lidarr — music library manager (automated "wanted" lists + import)
  # UI: http://localhost:8686 (kept on host for admin access)
  # ---------------------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "${TZ:-America/Los_Angeles}"
    volumes:
      - ./data/lidarr:/config
      - ${MUSIC_DIR:-./music}:/music
      - ./data/downloads:/downloads
    ports:
      - "8686:8686"
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # slskd — Soulseek daemon with REST API + web UI
  # UI: http://localhost:5030 (kept on host for admin access)
  # ---------------------------------------------------------------------------
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    environment:
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_SLSK_USERNAME: "${SOULSEEK_USER:-}"
      SLSKD_SLSK_PASSWORD: "${SOULSEEK_PASS:-}"
    volumes:
      - ./data/slskd:/app
      - ./data/downloads:/downloads
      - ${MUSIC_DIR:-./music}:/music:ro
    ports:
      - "5030:5030"
      - "50300:50300"
    networks:
      - musica_net

  # ---------------------------------------------------------------------------
  # Optional: analytics sidecar (uncomment when ready)
  # ---------------------------------------------------------------------------
  # analytics:
  #   image: ghcr.io/your-org/musica-analytics:latest
  #   container_name: musica-analytics
  #   restart: unless-stopped
  #   volumes:
  #     - ./data/analytics:/data
  #   environment:
  #     NAVIDROME_URL: "http://navidrome:4533"
  #     NAVIDROME_USER: "${NAVIDROME_ADMIN_USER}"
  #     NAVIDROME_PASS: "${NAVIDROME_ADMIN_PASS}"
  #   expose:
  #     - "3000"
  #   networks:
  #     - musica_net

networks:
  musica_net:
    driver: bridge
