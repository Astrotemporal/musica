# musica-pi5.yaml
# rpi-image-gen top-level config for a Raspberry Pi 5 running the musica stack.
# Targets: Debian Bookworm arm64, Pi 5 hardware.
#
# Build (inside privileged Docker container):
#   make build-docker
#
# After flashing, copy musica.env.template -> musica.env on the boot partition
# and set ZEROTIER_NETWORK_ID=<your-16-char-id>. No rebuild needed.
#
# See companion README for full build instructions.

# ---------------------------------------------------------------------------
# Base profile — pulls in Debian Bookworm minbase + RPi kernel + boot firmware
# (also sets device.layer: rpi5)
# ---------------------------------------------------------------------------
include:
  file: bookworm-minbase.yaml

# ---------------------------------------------------------------------------
# Image layout — MBR image: 256 MB FAT boot + ext4 root (8 GB)
# ---------------------------------------------------------------------------
image:
  layer: image-rpios
  name: musica-pi5
  boot_part_size: 256M
  root_part_size: 8G

# ---------------------------------------------------------------------------
# Layers — ordered; each resolves to ./rpi-image/config/layer/<name>.yaml
# ---------------------------------------------------------------------------
layer:
  zerotier: zerotier
  docker: docker
  musica_bootstrap: musica-bootstrap

# ---------------------------------------------------------------------------
# Device / system variables
# ---------------------------------------------------------------------------
device:
  hostname: metsa
  locale: en_US.UTF-8
  timezone: America/New_York
  user1: musica

