# musica-pi5-personal.yaml
# Personal fork of the musica image config — extends the public config with
# the UniFi Network Application layer for managing a Ubiquiti switch.
#
# Use this file instead of musica-pi5.yaml when building your own image.
# The public repo only ships musica-pi5.yaml — this file lives in the private/unifi branch.
#
# Build:
#   ZEROTIER_NETWORK_ID=yournetid \
#   UNIFI_MONGO_PASS=strongpass \
#   UNIFI_MONGO_ROOT_PASS=strongrootpass \
#     ./rpi-image-gen build -S /workspace/rpi-image -c rpi-image/config/musica-pi5-personal.yaml

# ---------------------------------------------------------------------------
# Inherit everything from the public config
# ---------------------------------------------------------------------------
include:
  file: musica-pi5.yaml        # pulls in base, ssh, zerotier, docker, musica-bootstrap

# ---------------------------------------------------------------------------
# Additional personal layers — appended after the public stack
# ---------------------------------------------------------------------------
layer:
  - name: unifi                # UniFi Network Application + MongoDB

# ---------------------------------------------------------------------------
# Variable overrides (personal)
# ---------------------------------------------------------------------------
variables:
  IGconf_device_hostname: metsa          # your Pi hostname
  IGconf_device_timezone: America/New_York

  # These are read from environment variables at build time.
  # Never commit real values here.
  IGconf_zerotier_network:    "${ZEROTIER_NETWORK_ID}"
  IGconf_unifi_mongo_pass:    "${UNIFI_MONGO_PASS}"
  IGconf_unifi_mongo_root_pass: "${UNIFI_MONGO_ROOT_PASS}"
