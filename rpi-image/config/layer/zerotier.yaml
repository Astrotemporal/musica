# layer/zerotier.yaml
# Installs ZeroTier One. On first boot, reads ZEROTIER_NETWORK_ID from
# /boot/firmware/musica.env (the FAT32 boot partition — editable from any OS
# after flashing) and joins the specified network.

# METABEGIN
# X-Env-Layer-Name: zerotier
# X-Env-Layer-Desc: Installs ZeroTier One VPN; joins network ID from boot partition on first boot
# X-Env-Layer-Version: 2.0.0
# METAEND
---
mmdebstrap:
  packages:
    - curl
    - gnupg

  customize-hooks:
    # Install ZeroTier via the official apt repository (chroot-safe, no pipe-to-bash)
    - |
      curl -fsSL 'https://raw.githubusercontent.com/zerotier/ZeroTierOne/main/doc/contact%40zerotier.com.gpg' \
        | gpg --dearmor > "$1/etc/apt/trusted.gpg.d/zerotier.gpg"
      echo "deb https://download.zerotier.com/debian/bookworm bookworm main" \
        > "$1/etc/apt/sources.list.d/zerotier.list"
      chroot "$1" apt-get update -qq
      chroot "$1" apt-get install -y zerotier-one
      chroot "$1" systemctl enable zerotier-one

    # Drop a musica.env template on the boot partition so users know what to fill in.
    # The FAT32 boot partition is visible from Windows/macOS/Linux after flashing.
    - |
      mkdir -p "$1/boot/firmware"
      cat > "$1/boot/firmware/musica.env.template" << 'ENVFILE'
      # musica configuration — copy this file to musica.env and fill in your values.
      # The boot partition is visible from any OS after flashing the SD card.

      # Your 16-character ZeroTier network ID (find it at my.zerotier.com)
      ZEROTIER_NETWORK_ID=
      ENVFILE

    # First-boot join script: reads network ID from /boot/firmware/musica.env
    - |
      cat > "$1/usr/local/bin/zerotier-join-network" << 'SCRIPT'
      #!/bin/sh
      set -e

      ENV_FILE=/boot/firmware/musica.env
      if [ ! -f "$ENV_FILE" ]; then
        echo "zerotier-join: $ENV_FILE not found — skipping network join" >&2
        echo "  Create $ENV_FILE with ZEROTIER_NETWORK_ID=<your-16-char-id>" >&2
        exit 0
      fi

      # Source the env file (ignore comments and blank lines)
      . "$ENV_FILE"

      if [ -z "$ZEROTIER_NETWORK_ID" ]; then
        echo "zerotier-join: ZEROTIER_NETWORK_ID not set in $ENV_FILE — skipping" >&2
        exit 0
      fi

      echo "zerotier-join: joining network $ZEROTIER_NETWORK_ID"
      zerotier-cli join "$ZEROTIER_NETWORK_ID"
      systemctl disable zerotier-join-network.service
      SCRIPT
      chmod +x "$1/usr/local/bin/zerotier-join-network"

    - |
      cat > "$1/etc/systemd/system/zerotier-join-network.service" << 'EOF'
      [Unit]
      Description=Join ZeroTier network on first boot
      After=zerotier-one.service network-online.target
      Wants=network-online.target
      ConditionPathExists=!/var/lib/zerotier-one/networks.d/*.conf

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/zerotier-join-network
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      EOF
      chroot "$1" systemctl enable zerotier-join-network.service
