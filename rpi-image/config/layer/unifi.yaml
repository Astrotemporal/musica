# layer/unifi.yaml
# Drops the UniFi Network Application compose file and supporting files
# onto the image as a supplemental stack alongside the musica services.
#
# This layer is intentionally NOT included in the public musica-pi5.yaml —
# add it via musica-pi5-personal.yaml in the private/unifi branch only.
#
# UniFi stack layout:
#   unifi-db                   — MongoDB (pinned, RBAC enabled)
#   unifi-network-application  — linuxserver.io UniFi controller
#
# Both containers use network_mode: host so that:
#   - UDP broadcast discovery (10001/udp) works without extra routing
#   - MongoDB is reachable at 127.0.0.1 from the controller (Docker bridge
#     DNS does not resolve service names in host-network containers)
#
# Switch adoption note:
#   After first boot, open https://<pi-ip>:8443 and complete the setup wizard.
#   Then go to Settings > System > Advanced, set "Inform Host" to the Pi's
#   ZeroTier IP (or LAN IP), and check "Override". Port 8080 must not be remapped.

# --- METASTART ---
# X-Layer-Name: unifi
# X-Layer-Description: UniFi Network Application + MongoDB for managing Ubiquiti switches/APs
# X-Layer-Version: 1
# X-Env-Var-unifi_mongo_pass-Description: MongoDB password for the unifi DB user
# X-Env-Var-unifi_mongo_pass-Required: y
# X-Env-Var-unifi_mongo_pass-Set: n
# X-Env-Var-unifi_mongo_root_pass-Description: MongoDB root password
# X-Env-Var-unifi_mongo_root_pass-Required: y
# X-Env-Var-unifi_mongo_root_pass-Set: n
# --- METAEND ---

mmdebstrap:
  packages: []

  customize-hooks:
    # Create the unifi app directory
    - mkdir -p "$1/opt/unifi"

    # Drop the MongoDB init script — runs once on first container start
    - |
      mkdir -p "$1/opt/unifi/db-init"
      cp "$LAYER_DIR/files/init-mongo.sh" "$1/opt/unifi/db-init/init-mongo.sh"
      chmod +x "$1/opt/unifi/db-init/init-mongo.sh"

    # Drop the unifi docker-compose file
    - |
      cat > "$1/opt/unifi/docker-compose.unifi.yml" << 'COMPOSEFILE'
# docker-compose.unifi.yml
# UniFi Network Application stack — personal addition to the musica image.
# Start separately if needed:  docker compose -f docker-compose.unifi.yml up -d

services:

  # -----------------------------------------------------------------------
  # MongoDB — pinned to 7.0 (compatible with UniFi 8.x and 9.x)
  # DO NOT expose port 27017 externally. RBAC auth is enabled via init script.
  # DO NOT change the image version without a manual migration first.
  #
  # network_mode: host — required so that unifi-network-application (also on
  # host network) can reach MongoDB at 127.0.0.1 instead of a Docker service
  # name (Docker bridge DNS does not work across host-network containers).
  # -----------------------------------------------------------------------
  unifi-db:
    image: docker.io/mongo:7.0
    container_name: unifi-db
    network_mode: host
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: "${UNIFI_MONGO_ROOT_PASS}"
      MONGO_USER:     "${UNIFI_MONGO_USER:-unifi}"
      MONGO_PASS:     "${UNIFI_MONGO_PASS}"
      MONGO_DBNAME:   "${UNIFI_MONGO_DBNAME:-unifi}"
    volumes:
      - /opt/unifi/data/db:/data/db
      - /opt/unifi/db-init/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro

  # -----------------------------------------------------------------------
  # UniFi Network Application
  # Web UI: https://<pi-ip>:8443  (self-signed cert — expect a browser warning)
  #
  # Key ports (all bound to host network):
  #   8443      — HTTPS web UI
  #   8080      — device inform endpoint (MUST be 8080, do not remap)
  #   3478/udp  — STUN (speeds up device connectivity)
  #   10001/udp — AP/switch L2 discovery broadcasts
  #
  # network_mode: host is required for UDP broadcast discovery and L2 device
  # adoption to work reliably without extra routing config. Acceptable trade-off
  # for a dedicated Pi.
  # -----------------------------------------------------------------------
  unifi-network-application:
    image: lscr.io/linuxserver/unifi-network-application:latest
    container_name: unifi-network-application
    network_mode: host
    restart: unless-stopped
    depends_on:
      - unifi-db
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ:   "${TZ:-America/New_York}"
      MONGO_USER:       "${UNIFI_MONGO_USER:-unifi}"
      MONGO_PASS:       "${UNIFI_MONGO_PASS}"
      MONGO_HOST:       "127.0.0.1"
      MONGO_PORT:       "27017"
      MONGO_DBNAME:     "${UNIFI_MONGO_DBNAME:-unifi}"
      MONGO_AUTHSOURCE: admin
      MEM_LIMIT:        "1024"   # MB — tune down if Pi RAM is tight
      MEM_STARTUP:      "512"
    volumes:
      - /opt/unifi/data/app:/config
COMPOSEFILE

    # Drop an .env template for the unifi-specific secrets
    - |
      cat > "$1/opt/unifi/.env.template" << 'ENVFILE'
# Copy to /opt/unifi/.env and fill in before first boot.
# These are intentionally separate from the musica .env.

UNIFI_MONGO_ROOT_PASS=change_me_root
UNIFI_MONGO_USER=unifi
UNIFI_MONGO_PASS=change_me_unifi
UNIFI_MONGO_DBNAME=unifi

# Set this to the Pi's ZeroTier IP or LAN IP after joining your network.
# Used only as a reminder — the Inform Host must be set in the UniFi UI too.
# Settings > System > Advanced > Inform Host (check Override)
UNIFI_INFORM_HOST=<your-pi-ip>
ENVFILE

    # Systemd service to start the unifi stack alongside the musica stack
    - |
      cat > "$1/etc/systemd/system/unifi-start.service" << 'UNIT'
[Unit]
Description=Start UniFi docker-compose stack on first boot
After=docker.service musica-start.service network-online.target
Wants=network-online.target
ConditionPathExists=!/opt/unifi/.stack-started

[Service]
Type=oneshot
WorkingDirectory=/opt/unifi
ExecStartPre=/bin/sh -c '[ -f /opt/unifi/.env ] || cp /opt/unifi/.env.template /opt/unifi/.env'
ExecStart=/usr/bin/docker compose -f docker-compose.unifi.yml pull
ExecStart=/usr/bin/docker compose -f docker-compose.unifi.yml up -d
ExecStartPost=/usr/bin/touch /opt/unifi/.stack-started
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
UNIT

    - $BDEBSTRAP_HOOKS/enable-units "$1" unifi-start
