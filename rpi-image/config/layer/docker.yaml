# layer/docker.yaml
# Installs Docker CE (from Docker's official apt repo) + docker-compose-plugin.
# Enables the docker daemon via systemd.
# Also adds the default user to the docker group so sudo is not needed.

# METABEGIN
# X-Env-Layer-Name: docker
# X-Env-Layer-Desc: Installs Docker CE engine and compose plugin, enables daemon
# X-Env-Layer-Version: 1.0.0
# METAEND
---
mmdebstrap:
  packages:
    - ca-certificates
    - curl
    - gnupg
    - lsb-release

  customize-hooks:
    # Add Docker's official GPG key and apt repo
    - |
      install -m 0755 -d "$1/etc/apt/keyrings"
      curl -fsSL https://download.docker.com/linux/debian/gpg \
        | gpg --dearmor -o "$1/etc/apt/keyrings/docker.gpg"
      chmod a+r "$1/etc/apt/keyrings/docker.gpg"

      ARCH=$(dpkg --print-architecture)
      CODENAME=$(. "$1/etc/os-release" && echo "$VERSION_CODENAME")
      cat > "$1/etc/apt/sources.list.d/docker.list" << EOF
      deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian ${CODENAME} stable
      EOF

    # Install Docker packages inside the chroot
    - |
      chroot "$1" apt-get update -qq
      chroot "$1" apt-get install -y --no-install-recommends \
        docker-ce \
        docker-ce-cli \
        containerd.io \
        docker-buildx-plugin \
        docker-compose-plugin

    # Enable docker daemon on boot
    - $BDEBSTRAP_HOOKS/enable-units "$1" docker

    # Add the default user to the docker group
    - |
      chroot "$1" usermod -aG docker "$IGconf_device_user1" || true
